<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Manage Saved CSS</title>
    <style>
      body {
        background: #f7f8fa;
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-width: 340px;
        min-height: 320px;
      }
      .container {
        padding: 18px 16px 16px 16px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        margin: 24px auto;
        max-width: 1200px;
        min-width: 340px;
      }
      h2 {
        margin-top: 0;
        color: #3730a3;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .css-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 12px;
      }
      .css-table th, .css-table td {
        vertical-align: top;
        padding: 0;
      }
      .css-table th {
        text-align: left;
        color: #6366f1;
        font-size: 1em;
        padding-bottom: 6px;
      }
      .css-row {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.03);
      }
      .css-url-cell {
        width: 28%;
        min-width: 180px;
        padding: 14px 10px 14px 18px;
        border-right: 1px solid #e5e7eb;
      }
      .css-css-cell {
        width: 65%;
        padding: 14px 10px;
      }
      .css-actions-cell {
        width: 7%;
        min-width: 40px;
        text-align: center;
        padding: 14px 10px;
      }
      .css-url-input {
        width: 100%;
        font-size: 1em;
        border-radius: 5px;
        border: 1px solid #d1d5db;
        padding: 4px 8px;
        background: #fff;
        transition: border 0.2s;
      }
      .css-url-input:focus {
        border: 1.5px solid #6366f1;
        outline: none;
      }
      .css-css-area {
        width: 100%;
        min-height: 60px;
        font-family: monospace;
        border-radius: 5px;
        border: 1px solid #d1d5db;
        padding: 6px 8px;
        background: #f3f4f6;
        transition: border 0.2s;
        resize: vertical;
      }
      .css-css-area:focus {
        border: 1.5px solid #6366f1;
        background: #fff;
        outline: none;
      }
      .delete-btn {
        background: none;
        border: none;
        color: #dc2626;
        font-size: 1.5em;
        cursor: pointer;
        padding: 0 8px;
        border-radius: 50%;
        transition: background 0.2s;
        line-height: 1;
      }
      .delete-btn:hover, .delete-btn:focus {
        background: #fee2e2;
      }
      #addNew {
        margin-top: 20px;
        margin-bottom: 10px;
        padding: 8px 18px;
        border-radius: 6px;
        border: none;
        background: #6366f1;
        color: #fff;
        font-size: 1em;
        cursor: pointer;
        transition: background 0.2s;
      }
      #addNew:hover, #addNew:focus {
        background: #4f46e5;
      }
      #saveAll {
        margin-top: 18px;
        margin-bottom: 10px;
        padding: 10px 28px;
        border-radius: 6px;
        border: none;
        background: #22c55e;
        color: #fff;
        font-size: 1.08em;
        cursor: pointer;
        transition: background 0.2s;
        float: right;
      }
      #saveAll:hover, #saveAll:focus {
        background: #16a34a;
      }
      #status {
        color: #2563eb;
        margin-bottom: 10px;
        min-height: 1.5em;
        clear: both;
      }
      @media (max-width: 900px) {
        .container {
          max-width: 98vw;
        }
        .css-url-cell, .css-css-cell, .css-actions-cell {
          display: block;
          width: 100% !important;
          border-right: none;
          padding: 10px 0;
        }
        .css-table th, .css-table td {
          display: block;
        }
        .css-row {
          margin-bottom: 18px;
        }
      }
    </style>
    <script defer src="options.js"></script>
  </head>
  <body>
    <div class="container">
      <h2>Saved CSS Rules</h2>
      <div id="status"></div>
      <table class="css-table" id="cssTable">
        <thead>
          <tr>
            <th>URL / Pattern</th>
            <th>CSS</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cssList"></tbody>
      </table>
      <button id="addNew">Add New Rule</button>
      <button id="saveAll">Save All</button>
    </div>
  </body>
</html>
